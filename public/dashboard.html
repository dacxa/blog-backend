<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>内容审核 - 守夜人论坛</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <nav class="site-nav" aria-label="主导航">
        <a class="brand" href="index.html">守夜人论坛</a>
        <div class="nav-links">
            <a href="index.html">返回论坛</a>
            <button class="button button-secondary" id="logout-button" type="button">退出</button>
        </div>
    </nav>

    <main class="page-shell">
        <h1 class="page-heading">待审核投稿</h1>
        <p class="page-intro">只有已通过服务器身份校验的管理员才能执行审核。</p>
        <p class="notice" id="dashboard-message" hidden aria-live="polite"></p>
        <section aria-labelledby="pending-heading">
            <h2 class="section-heading" id="pending-heading">待处理内容</h2>
            <div class="button-row">
                <button class="button button-secondary" id="refresh-pending-button" type="button" disabled>刷新待审列表</button>
            </div>
            <div class="post-list" id="pending-list" aria-live="polite"></div>
        </section>
    </main>

    <script src="js/api-errors.js"></script>
    <script src="js/api.js"></script>
    <script>
        (function () {
            "use strict";

            var pendingList = document.getElementById("pending-list");
            var message = document.getElementById("dashboard-message");
            var refreshButton = document.getElementById("refresh-pending-button");
            var adminVerified = false;

            function setMessage(text, type) {
                message.textContent = text;
                message.className = "notice notice-" + type;
                message.hidden = !text;
            }

            function redirectForAccessError(error) {
                if (error.status === 401) {
                    window.location.replace("login.html");
                    return true;
                }
                if (error.status === 403) {
                    window.location.replace("index.html");
                    return true;
                }
                return false;
            }

            function statusText(status) {
                var labels = { pending: "待审核", published: "已发布", rejected: "已驳回" };
                return labels[status] || status || "未知状态";
            }

            function createButton(text, className, handler) {
                var button = document.createElement("button");
                button.className = className;
                button.type = "button";
                button.textContent = text;
                button.addEventListener("click", handler);
                return button;
            }

            async function review(post, review, controls) {
                controls.forEach(function (control) {
                    control.disabled = true;
                });

                try {
                    await blogApi.reviewPost(post.id, review);
                    setMessage("审核结果已保存。", "success");
                    await loadPendingPosts();
                } catch (error) {
                    if (redirectForAccessError(error)) {
                        return;
                    }
                    controls.forEach(function (control) {
                        control.disabled = false;
                    });
                    setMessage(error.message, "error");
                }
            }

            function renderPendingPosts(posts) {
                pendingList.replaceChildren();
                if (!Array.isArray(posts) || posts.length === 0) {
                    var empty = document.createElement("p");
                    empty.className = "empty-state";
                    empty.textContent = "当前没有待审核投稿。";
                    pendingList.appendChild(empty);
                    return;
                }

                posts.forEach(function (post) {
                    var article = document.createElement("article");
                    article.className = "post-card";

                    var status = document.createElement("span");
                    status.className = "status";
                    status.textContent = statusText(post.status);
                    article.appendChild(status);

                    var title = document.createElement("h2");
                    title.textContent = post.title || "未命名文章";
                    article.appendChild(title);

                    var author = document.createElement("p");
                    author.className = "post-meta";
                    author.textContent = "作者 ID：" + (post.author_id || "未知");
                    article.appendChild(author);

                    var content = document.createElement("p");
                    content.className = "post-content";
                    content.textContent = post.content || "";
                    article.appendChild(content);

                    var noteLabel = document.createElement("label");
                    noteLabel.className = "field";
                    noteLabel.textContent = "驳回说明";
                    var note = document.createElement("textarea");
                    note.className = "review-note";
                    note.rows = 3;
                    note.placeholder = "驳回时必须填写说明";
                    noteLabel.appendChild(note);
                    article.appendChild(noteLabel);

                    var actions = document.createElement("div");
                    actions.className = "review-actions";
                    var publishButton = createButton("通过", "button", function () {
                        review(post, { status: "published" }, [publishButton, rejectButton, note]);
                    });
                    var rejectButton = createButton("驳回", "button button-danger", function () {
                        var reviewNote = note.value.trim();
                        if (!reviewNote) {
                            setMessage("驳回投稿时必须填写驳回说明。", "error");
                            note.focus();
                            return;
                        }
                        review(post, { status: "rejected", note: reviewNote }, [publishButton, rejectButton, note]);
                    });
                    actions.appendChild(publishButton);
                    actions.appendChild(rejectButton);
                    article.appendChild(actions);
                    pendingList.appendChild(article);
                });
            }

            async function loadPendingPosts() {
                refreshButton.disabled = true;
                refreshButton.textContent = "正在刷新";
                try {
                    renderPendingPosts(await blogApi.getPendingPosts());
                } catch (error) {
                    if (redirectForAccessError(error)) {
                        return;
                    }
                    setMessage(error.message, "error");
                } finally {
                    refreshButton.disabled = !adminVerified;
                    refreshButton.textContent = "刷新待审列表";
                }
            }

            async function loadDashboard() {
                try {
                    var user = await blogApi.getCurrentUser();
                    if (!user || user.role !== "admin") {
                        window.location.replace("index.html");
                        return;
                    }
                    adminVerified = true;
                    refreshButton.disabled = false;
                    await loadPendingPosts();
                } catch (error) {
                    if (redirectForAccessError(error)) {
                        return;
                    }
                    setMessage(error.message, "error");
                }
            }

            document.getElementById("logout-button").addEventListener("click", async function () {
                try {
                    await blogApi.logout();
                } finally {
                    window.location.href = "index.html";
                }
            });

            refreshButton.addEventListener("click", loadPendingPosts);

            loadDashboard();
        })();
    </script>
</body>
</html>
