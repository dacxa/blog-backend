<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>守夜人论坛</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <nav class="site-nav" aria-label="主导航">
        <a class="brand" href="index.html">守夜人论坛</a>
        <div class="nav-links" id="nav-links"></div>
    </nav>

    <main class="page-shell">
        <h1 class="page-heading">已发布文章</h1>
        <p class="page-intro">社区内容经过审核后会在这里公开显示。</p>
        <p class="notice" id="page-message" hidden></p>
        <section aria-labelledby="posts-heading">
            <h2 class="section-heading" id="posts-heading">最新内容</h2>
            <div class="post-list" id="post-list" aria-live="polite"></div>
        </section>
    </main>

    <script src="js/api-errors.js"></script>
    <script src="js/api.js"></script>
    <script>
        (function () {
            "use strict";

            var navLinks = document.getElementById("nav-links");
            var postList = document.getElementById("post-list");
            var message = document.getElementById("page-message");

            function setMessage(text, type) {
                message.textContent = text;
                message.className = "notice notice-" + type;
                message.hidden = !text;
            }

            function addNavLink(text, href) {
                var link = document.createElement("a");
                link.href = href;
                link.textContent = text;
                navLinks.appendChild(link);
            }

            function renderNavigation(user) {
                navLinks.replaceChildren();
                if (!user) {
                    addNavLink("登录", "login.html");
                    addNavLink("注册", "register.html");
                    return;
                }

                var userLabel = document.createElement("span");
                userLabel.className = "nav-user";
                userLabel.textContent = user.username;
                navLinks.appendChild(userLabel);
                addNavLink("投稿", "submit.html");
                addNavLink("我的投稿", "my-posts.html");
                if (user.role === "admin") {
                    addNavLink("审核后台", "dashboard.html");
                }

                var logoutButton = document.createElement("button");
                logoutButton.className = "button button-secondary";
                logoutButton.type = "button";
                logoutButton.textContent = "退出";
                logoutButton.addEventListener("click", async function () {
                    try {
                        await blogApi.logout();
                    } finally {
                        window.location.href = "index.html";
                    }
                });
                navLinks.appendChild(logoutButton);
            }

            function metadataText(post) {
                var author = post.author_username || post.author || "匿名作者";
                return "作者：" + author;
            }

            function renderPosts(posts) {
                postList.replaceChildren();
                if (!Array.isArray(posts) || posts.length === 0) {
                    var empty = document.createElement("p");
                    empty.className = "empty-state";
                    empty.textContent = "暂无已发布文章。";
                    postList.appendChild(empty);
                    return;
                }

                posts.forEach(function (post) {
                    var article = document.createElement("article");
                    article.className = "post-card";

                    var title = document.createElement("h2");
                    title.textContent = post.title || "未命名文章";
                    article.appendChild(title);

                    var meta = document.createElement("p");
                    meta.className = "post-meta";
                    meta.textContent = metadataText(post);
                    article.appendChild(meta);

                    var content = document.createElement("p");
                    content.className = "post-content";
                    content.textContent = post.content || "";
                    article.appendChild(content);
                    postList.appendChild(article);
                });
            }

            async function loadPage() {
                try {
                    var user = await blogApi.getCurrentUser();
                    renderNavigation(user);
                } catch (error) {
                    renderNavigation(null);
                    setMessage(error.message, "error");
                }

                try {
                    renderPosts(await blogApi.getPublishedPosts());
                } catch (error) {
                    setMessage(error.message, "error");
                }
            }

            loadPage();
        })();
    </script>
</body>
</html>
