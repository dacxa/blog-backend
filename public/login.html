<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 - 守夜人论坛</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body class="login-page">
    <main class="login-panel">
        <h1 class="page-heading">登录论坛</h1>
        <p class="page-intro">使用你的账号继续访问社区。</p>
        <p class="notice" id="login-message" hidden aria-live="polite"></p>
        <form id="login-form">
            <div class="field">
                <label for="username">用户名</label>
                <input id="username" name="username" autocomplete="username" required>
            </div>
            <div class="field">
                <label for="password">密码</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
            </div>
            <div class="button-row">
                <button class="button" id="login-button" type="submit">登录</button>
                <a href="register.html">注册账号</a>
            </div>
        </form>
    </main>

    <script src="js/api-errors.js"></script>
    <script src="js/api.js"></script>
    <script>
        (function () {
            "use strict";

            var form = document.getElementById("login-form");
            var button = document.getElementById("login-button");
            var message = document.getElementById("login-message");

            function setMessage(text, type) {
                message.textContent = text;
                message.className = "notice notice-" + type;
                message.hidden = !text;
            }

            form.addEventListener("submit", async function (event) {
                event.preventDefault();
                var username = document.getElementById("username").value.trim();
                var password = document.getElementById("password").value;
                button.disabled = true;
                setMessage("", "error");

                try {
                    await blogApi.login({
                        username: username,
                        password: password
                    });
                    var user = await blogApi.getCurrentUser();
                    window.location.href = user && user.role === "admin"
                        ? "dashboard.html"
                        : "index.html";
                } catch (error) {
                    setMessage(error.message, "error");
                    button.disabled = false;
                }
            });
        })();
    </script>
</body>
</html>
