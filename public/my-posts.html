<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我的投稿 - 守夜人论坛</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <nav class="site-nav" aria-label="主导航">
        <a class="brand" href="index.html">守夜人论坛</a>
        <div class="nav-links">
            <a href="submit.html">投稿</a>
            <a href="index.html">返回论坛</a>
        </div>
    </nav>

    <main class="page-shell">
        <h1 class="page-heading">我的投稿</h1>
        <p class="page-intro">这里会显示你提交的内容及审核状态。</p>
        <p class="notice" id="my-posts-message" hidden aria-live="polite"></p>
        <section aria-labelledby="my-posts-heading">
            <h2 class="section-heading" id="my-posts-heading">投稿记录</h2>
            <div class="post-list" id="my-posts-list" aria-live="polite"></div>
        </section>
    </main>

    <script src="js/api-errors.js"></script>
    <script src="js/api.js"></script>
    <script>
        (function () {
            "use strict";

            var postList = document.getElementById("my-posts-list");
            var message = document.getElementById("my-posts-message");

            function setMessage(text, type) {
                message.textContent = text;
                message.className = "notice notice-" + type;
                message.hidden = !text;
            }

            function redirectToLoginIfUnauthorized(error) {
                if (error.status === 401) {
                    window.location.replace("login.html");
                    return true;
                }
                return false;
            }

            function statusText(status) {
                var labels = { pending: "待审核", published: "已发布", rejected: "已驳回" };
                return labels[status] || status || "未知状态";
            }

            function renderPosts(posts) {
                postList.replaceChildren();
                if (!Array.isArray(posts) || posts.length === 0) {
                    var empty = document.createElement("p");
                    empty.className = "empty-state";
                    empty.textContent = "你还没有提交投稿。";
                    postList.appendChild(empty);
                    return;
                }

                posts.forEach(function (post) {
                    var article = document.createElement("article");
                    article.className = "post-card";

                    var status = document.createElement("span");
                    status.className = "status status-" + (post.status || "pending");
                    status.textContent = statusText(post.status);
                    article.appendChild(status);

                    var title = document.createElement("h2");
                    title.textContent = post.title || "未命名文章";
                    article.appendChild(title);

                    var content = document.createElement("p");
                    content.className = "post-content";
                    content.textContent = post.content || "";
                    article.appendChild(content);

                    if (post.status === "rejected" && post.review_note) {
                        var reviewNote = document.createElement("p");
                        reviewNote.className = "notice notice-error";
                        reviewNote.textContent = "驳回说明：" + post.review_note;
                        article.appendChild(reviewNote);
                    }

                    postList.appendChild(article);
                });
            }

            async function loadPosts() {
                try {
                    var user = await blogApi.requireCurrentUser();
                    if (!user) {
                        return;
                    }
                    renderPosts(await blogApi.getMyPosts());
                } catch (error) {
                    if (redirectToLoginIfUnauthorized(error)) {
                        return;
                    }
                    setMessage(error.message, "error");
                }
            }

            loadPosts();
        })();
    </script>
</body>
</html>
